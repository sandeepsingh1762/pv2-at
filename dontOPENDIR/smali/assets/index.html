<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView Example</title>
</head>
<body>
<h1>Hello from WebView!</h1>
<button onclick="callAndroid()">Call Android</button>
<button onclick="saveToLocalStorage('param', 'Hello World')">Save to LocalStorage</button>
<button onclick="alert(getFromLocalStorage('param'))">Get from LocalStorage</button>
<script>
    function callAndroid() {
        if (window.xamlAction && typeof window.xamlAction.showToast === 'function') {
            window.xamlAction.showToast('Hello from WebView!');
        } else {
            alert('xamlAction interface not available.');
        }
    }

    function saveToLocalStorage(key, value) {
        localStorage.setItem(key, value);
        console.log(key+":"+value)
    }

    function getFromLocalStorage(key) {
        console.log(localStorage.getItem(key))
        return localStorage.getItem(key);
    }

</script>

</body>
</html>
